[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "uzum-connector"
version = "0.1.0"
description = "Async Python client for Uzum Market Seller OpenAPI"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Hojiakbar Nasriddinov" }]
keywords = ["uzum", "marketplace", "uzbekistan", "seller-api", "async"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "httpx[http2]>=0.27",
    "pydantic>=2.9",
    "tenacity>=9.0",
    "orjson>=3.10",
]

[project.optional-dependencies]
redis = ["redis>=5.1"]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "ruff>=0.7",
    "mypy>=1.13",
]

[project.urls]
Repository = "https://github.com/xojiakbardev/anasklad-erp"

[tool.hatch.build.targets.wheel]
packages = ["src/uzum_connector"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RET", "PTH", "PL"]
ignore = ["PLR0913"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
