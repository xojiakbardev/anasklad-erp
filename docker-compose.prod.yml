services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anasklad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-anasklad}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anasklad}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB not published to host in prod — reachable only inside the compose network.

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: ${API_IMAGE:-ghcr.io/xojiakbardev/anasklad-erp-api:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-anasklad}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anasklad}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL_MINUTES: 30
      JWT_REFRESH_TTL_DAYS: 30
      CREDENTIALS_FERNET_KEY: ${CREDENTIALS_FERNET_KEY:?CREDENTIALS_FERNET_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://anasklad.uz}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LOG_LEVEL: INFO
    command: >
      sh -c "cd /app/backend && alembic upgrade heads && python -m anasklad.granian_entry"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    image: ${API_IMAGE:-ghcr.io/xojiakbardev/anasklad-erp-api:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-anasklad}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anasklad}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      CREDENTIALS_FERNET_KEY: ${CREDENTIALS_FERNET_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: INFO
    command: sh -c "cd /app/backend && arq anasklad.modules.sync.worker.WorkerSettings"

  web:
    image: ${WEB_IMAGE:-ghcr.io/xojiakbardev/anasklad-erp-web:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: always
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
